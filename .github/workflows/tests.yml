name: Testing pipeline

on:
  pull_request:
    branches:
      - main
      - addedUnitTest
  push:
    branches:
      - main
      - addedUnitTest

permissions:
  contents: 'read'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry==1.7.1
        poetry install
    - name: Run linters
      run: make lint-check

    - name: Run unit-tests
      run: make unit-tests

# Set Node.js version to 18 for running Cypress and npm commands
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cypress
      working-directory: tests/e2e_tests
      run: |
        npm install cypress

    - name: Run Flask server in background
      run: |
        poetry run flask run --host=goodmap.localhost --port=5000 &
        FLASK_PID=$!
        sleep 5

# Run all Cypress tests using default config
    - name: Run Cypress tests
      working-directory: tests/e2e_tests
      run: npx cypress run --browser chromium --config baseUrl=http://goodmap.localhost:5000

# Stop the Flask server using the saved process ID
    - name: Stop Flask server
      run: kill $FLASK_PID || true


